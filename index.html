<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피구 게임</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
#gameCanvas { display: block; border-radius: 12px; border: 1px solid #333; }
#ui { color: #ccc; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; width: 660px; }
.hp-bar { display: flex; gap: 6px; align-items: center; }
.hp-label { font-size: 13px; color: #888; margin-right: 4px; }
.hp-dot { width: 14px; height: 14px; border-radius: 50%; background: #E24B4A; border: 1.5px solid #A32D2D; }
.hp-dot.empty { background: #333; border-color: #555; }
#status { font-size: 12px; color: #888; text-align: center; }
#overlay { position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(0,0,0,0.6);border-radius:12px; }
#overlay h2 { color:#fff;font-size:22px;font-weight:500; }
#overlay p { color:rgba(255,255,255,0.75);font-size:14px; }
#overlay button { padding:10px 28px;border:1.5px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.15);color:#fff;border-radius:8px;font-size:15px;cursor:pointer; }
#overlay button:hover { background:rgba(255,255,255,0.28); }
.wrap { position:relative; }
</style>
</head>
<body>

<div id="ui">
  <div class="hp-bar"><span class="hp-label">나</span><div class="hp-dot" id="p1"></div><div class="hp-dot" id="p2"></div><div class="hp-dot" id="p3"></div></div>
  <div id="status">방향키 이동 &nbsp;|&nbsp; Z 줍기 &nbsp;|&nbsp; X 던지기</div>
  <div class="hp-bar"><div class="hp-dot" id="n1"></div><div class="hp-dot" id="n2"></div><div class="hp-dot" id="n3"></div><span class="hp-label">NPC</span></div>
</div>

<div class="wrap">
<canvas id="gameCanvas" width="660" height="420"></canvas>
<div id="overlay">
  <h2>🏐 피구</h2>
  <p>방향키 이동 &nbsp;·&nbsp; Z 줍기 &nbsp;·&nbsp; X 던지기</p>
  <button id="startBtn">게임 시작</button>
</div>
</div>

<script type="module">
import { OBSTACLES, drawMap } from './designs/map-01.js';
import { drawBall }           from './designs/ball.js';
import { drawPlayer }         from './designs/player.js';
import { drawNPC }            from './designs/npc.js';

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const SPD = 130;
const SAFE_DIST = 250;

let player, npc, ball, keys, gameState, animId, last;

function initState() {
  player = {x:80,  y:210, r:16, hp:3, hasBall:false, invTime:0, grogyTime:0};
  npc    = {x:580, y:210, r:16, hp:3, hasBall:true,  invTime:0, grogyTime:0,
            state:'aim', aimTimer:1.0, dodgeDir:null};
  ball   = {x:580, y:210, r:10, vx:0, vy:0, owner:'npc', thrownBy:null, flying:false, bounces:0};
  keys   = {};
  gameState = 'playing';
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  initState();
  if(animId) cancelAnimationFrame(animId);
  last = performance.now();
  animId = requestAnimationFrame(loop);
}

document.getElementById('startBtn').addEventListener('click', startGame);

function rectHit(x,y,r,o){ return x+r>o.x&&x-r<o.x+o.w&&y+r>o.y&&y-r<o.y+o.h; }
function obsBlock(nx,ny,r){ return OBSTACLES.some(o=>rectHit(nx,ny,r,o)); }
function clamp(e){ e.x=Math.max(e.r,Math.min(W-e.r,e.x)); e.y=Math.max(e.r,Math.min(H-e.r,e.y)); }
function moveEntity(e,dx,dy,spd){
  const nx=e.x+dx*spd, ny=e.y+dy*spd;
  if(!obsBlock(nx,e.y,e.r)) e.x=nx;
  if(!obsBlock(e.x,ny,e.r)) e.y=ny;
  clamp(e);
}
function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }
function hasLOS(a,b){
  for(let i=1;i<16;i++){
    const t=i/16,cx=a.x+(b.x-a.x)*t,cy=a.y+(b.y-a.y)*t;
    if(OBSTACLES.some(o=>cx>o.x&&cx<o.x+o.w&&cy>o.y&&cy<o.y+o.h)) return false;
  }
  return true;
}

function calcBallDodgeDir(){
  const bspd=Math.hypot(ball.vx,ball.vy);
  if(bspd<1) return null;
  const bux=ball.vx/bspd, buy=ball.vy/bspd;
  const toNx=npc.x-ball.x, toNy=npc.y-ball.y;
  if(toNx*bux+toNy*buy<0) return null;
  const crossDist=Math.abs(toNx*buy-toNy*bux);
  if(crossDist>55) return null;
  const p1x=-buy,p1y=bux,p2x=buy,p2y=-bux;
  const d1=Math.hypot(npc.x+p1x*60-ball.x,npc.y+p1y*60-ball.y);
  const d2=Math.hypot(npc.x+p2x*60-ball.x,npc.y+p2y*60-ball.y);
  return d1>d2?{x:p1x,y:p1y}:{x:p2x,y:p2y};
}

function doThrow(from,tx,ty,spd,who){
  const dx=tx-from.x,dy=ty-from.y,d=Math.hypot(dx,dy)||1;
  const offset=from.r+ball.r+10;
  ball.x=from.x+(dx/d)*offset; ball.y=from.y+(dy/d)*offset;
  ball.vx=dx/d*spd; ball.vy=dy/d*spd;
  ball.owner=null; ball.thrownBy=who;
  ball.flying=true; ball.bounces=0;
  from.hasBall=false;
  from.invTime=Math.max(from.invTime,0.3);
}

function pickUpBall(who){
  ball.owner=who; ball.flying=false; ball.vx=0; ball.vy=0;
  if(who==='player') player.hasBall=true;
  if(who==='npc'){ npc.hasBall=true; npc.dodgeDir=null; npc.aimTimer=0.5+Math.random()*0.5; }
}

function applyHit(target,isPlayer){
  target.hp=Math.max(0,target.hp-1);
  target.invTime=1.5; target.grogyTime=0.7;
  target.hasBall=false;
  ball.flying=false; ball.vx=0; ball.vy=0; ball.owner=null; ball.thrownBy=null;
  ball.x=target.x+(isPlayer?1:-1)*(target.r+ball.r+6);
  ball.y=target.y;
}

function updateHPUI(){
  for(let i=1;i<=3;i++){
    document.getElementById('p'+i).className='hp-dot'+(player.hp<i?' empty':'');
    document.getElementById('n'+i).className='hp-dot'+(npc.hp<i?' empty':'');
  }
}

function runFromPlayer(dt, speedMult){
  const dx=npc.x-player.x, dy=npc.y-player.y, d=Math.hypot(dx,dy)||1;
  const cx=(W/2-npc.x)*0.005, cy=(H/2-npc.y)*0.005;
  const ex=dx/d+cx, ey=dy/d+cy, ed=Math.hypot(ex,ey)||1;
  moveEntity(npc, ex/ed, ey/ed, SPD*(speedMult||1)*dt);
}

function updateNPC(dt){
  if(npc.grogyTime>0) return;
  npc.aimTimer-=dt;

  if(npc.hasBall){
    npc.dodgeDir=null;
    if(hasLOS(npc,player)){
      npc.state='aim';
      const d=dist(npc,player);
      if(d>200){
        const dx=player.x-npc.x,dy=player.y-npc.y,dd=Math.hypot(dx,dy)||1;
        moveEntity(npc,dx/dd,dy/dd,SPD*dt);
      } else if(d<100){
        const dx=npc.x-player.x,dy=npc.y-player.y,dd=Math.hypot(dx,dy)||1;
        moveEntity(npc,dx/dd,dy/dd,SPD*dt);
      }
      if(npc.aimTimer<=0){
        doThrow(npc,player.x+(Math.random()-0.5)*25,player.y+(Math.random()-0.5)*25,300,'npc');
      }
    } else {
      npc.state='reposition';
      const dx=player.x-npc.x,dy=player.y-npc.y,d=Math.hypot(dx,dy)||1;
      moveEntity(npc,dx/d,dy/d,SPD*dt);
    }
    return;
  }

  const ballFree     = !ball.flying && ball.owner===null;
  const ballBouncing = ball.flying && ball.bounces>0;
  const ballIncoming = ball.flying && ball.thrownBy==='player' && ball.bounces===0;
  const playerHasBall= player.hasBall;
  const npcCloser    = dist(npc,ball) < dist(player,ball);

  if(ballIncoming){
    npc.state='dodge';
    const dir=calcBallDodgeDir();
    if(dir && !npc.dodgeDir) npc.dodgeDir=dir;
    if(npc.dodgeDir) moveEntity(npc,npc.dodgeDir.x,npc.dodgeDir.y,SPD*dt);
    else runFromPlayer(dt);
    return;
  }
  npc.dodgeDir=null;

  if((ballFree||ballBouncing) && npcCloser){
    npc.state='fetch';
    const dx=ball.x-npc.x,dy=ball.y-npc.y,d=Math.hypot(dx,dy)||1;
    if(d>12) moveEntity(npc,dx/d,dy/d,SPD*dt);
    if(dist(ball,npc)<ball.r+npc.r+12) pickUpBall('npc');
    return;
  }

  if(playerHasBall){
    npc.state='evade';
    runFromPlayer(dt);
    return;
  }

  if(ballFree||ballBouncing){
    npc.state='watch';
    const d=dist(npc,player);
    if(d < SAFE_DIST){
      runFromPlayer(dt, 0.8);
    } else {
      const dx=ball.x-npc.x,dy=ball.y-npc.y,dd=Math.hypot(dx,dy)||1;
      moveEntity(npc,dx/dd,dy/dd,SPD*0.5*dt);
    }
    return;
  }

  npc.state='wait';
}

function updateBall(dt){
  if(!ball.flying) return;
  ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;
  let bounced=false;
  OBSTACLES.forEach(o=>{
    if(rectHit(ball.x,ball.y,ball.r,o)){
      ball.vx*=-0.7; ball.vy*=-0.7;
      ball.x+=ball.vx*dt*4; ball.y+=ball.vy*dt*4;
      bounced=true;
    }
  });
  if(ball.x<ball.r||ball.x>W-ball.r){ball.vx*=-0.8;ball.x=Math.max(ball.r,Math.min(W-ball.r,ball.x));bounced=true;}
  if(ball.y<ball.r||ball.y>H-ball.r){ball.vy*=-0.8;ball.y=Math.max(ball.r,Math.min(H-ball.r,ball.y));bounced=true;}
  if(bounced){ball.bounces++;npc.dodgeDir=null;}
  if(Math.hypot(ball.vx,ball.vy)<18){ball.flying=false;ball.vx=0;ball.vy=0;ball.thrownBy=null;}
  const canHit=ball.flying&&ball.bounces===0;
  if(canHit&&ball.thrownBy!=='npc'&&dist(ball,npc)<ball.r+npc.r&&npc.invTime<=0){
    applyHit(npc,false); if(npc.hp<=0){endGame('win');return;}
  }
  if(canHit&&ball.thrownBy!=='player'&&dist(ball,player)<ball.r+player.r&&player.invTime<=0){
    applyHit(player,true); if(player.hp<=0){endGame('lose');return;}
  }
}

function endGame(result){
  gameState=result;
  const ov=document.getElementById('overlay');
  ov.innerHTML=result==='win'
    ?'<h2>🎉 승리!</h2><p>NPC를 쓰러뜨렸습니다</p><button id=startBtn>다시 하기</button>'
    :'<h2>💀 패배...</h2><p>3번 맞았습니다</p><button id=startBtn>다시 하기</button>';
  ov.style.display='flex';
  document.getElementById('startBtn').addEventListener('click', startGame);
}

function loop(ts){
  if(gameState!=='playing'){animId=null;return;}
  const dt=Math.min((ts-last)/1000,0.05); last=ts;
  if(player.invTime>0)   player.invTime-=dt;
  if(player.grogyTime>0) player.grogyTime-=dt;
  if(npc.invTime>0)      npc.invTime-=dt;
  if(npc.grogyTime>0)    npc.grogyTime-=dt;
  if(player.grogyTime<=0){
    let dx=0,dy=0;
    if(keys['ArrowUp'])    dy=-1;
    if(keys['ArrowDown'])  dy=1;
    if(keys['ArrowLeft'])  dx=-1;
    if(keys['ArrowRight']) dx=1;
    if(dx||dy){const d=Math.hypot(dx,dy);moveEntity(player,dx/d,dy/d,SPD*dt);}
  }
  if(player.hasBall){ball.x=player.x;ball.y=player.y;}
  if(npc.hasBall)   {ball.x=npc.x;   ball.y=npc.y;}
  updateNPC(dt);
  updateBall(dt);
  updateHPUI();
  draw();
  animId=requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if(gameState!=='playing') return;
  if(e.key==='z'||e.key==='Z'){
    if(player.grogyTime>0) return;
    if(!player.hasBall&&ball.owner!=='npc'&&dist(ball,player)<ball.r+player.r+32){
      if(!ball.flying||ball.bounces>0) pickUpBall('player');
    }
  }
  if(e.key==='x'||e.key==='X'){
    if(player.grogyTime>0) return;
    if(player.hasBall) doThrow(player,npc.x+(Math.random()-0.5)*20,npc.y+(Math.random()-0.5)*20,340,'player');
  }
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

function draw(){
  ctx.clearRect(0, 0, W, H);
  drawMap(ctx, W, H);
  drawBall(ctx, ball, player, npc);
  drawPlayer(ctx, player, npc, ball);
  drawNPC(ctx, npc);
}
</script>
</body>
</html>
